<!doctype html>
<!-- 냉파 프로토타입 ⑥ 레시피 북 — 저장 카운터 + URL 붙여넣기 + 저장 레시피 리스트. applied-app.jpeg 화면6 재현. -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>냉파 · ⑥ 레시피 북</title>
<link rel="stylesheet" href="tokens.css">
<style>
  .quota { border: 1px solid var(--hairline); padding: 16px; margin-bottom: 16px; }
  .field { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--sunken); border-radius: var(--r-control); padding: 0 12px; height: 46px; }
  .field svg { color: var(--muted); width: 18px; height: 18px; flex: 0 0 auto; }
  .field input { border: 0; background: transparent; font-family: inherit; font-size: 15px; width: 100%; outline: none; color: var(--text); }
  .field input::placeholder { color: var(--muted); }
  .btn-add { background: var(--action); color: #fff; border: 0; border-radius: var(--r-control); padding: 0 18px; font-family: inherit; font-weight: 600; font-size: 16px; cursor: pointer; }
  .thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex: 0 0 auto; }
  .rsrc { display: flex; align-items: center; gap: 5px; color: var(--muted); margin-top: 3px; }
  .rsrc svg { width: 13px; height: 13px; flex: 0 0 auto; }
</style>
</head>
