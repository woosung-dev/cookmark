<!doctype html>
<!-- 냉파 프로토타입 ③ 재료 체크리스트 — confidence 3단 그룹 + 뭉뚱그림 항목. applied-app.jpeg 화면3 재현. -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>냉파 · ③ 재료 확인</title>
<link rel="stylesheet" href="tokens.css">
<style>
  .grp { margin-bottom: 22px; }
  .ing { min-height: 52px; display: flex; align-items: center; gap: 14px; padding: 12px 16px; }
  .ing + .ing { border-top: 1px solid var(--hairline); }
  .ing .name { flex: 1 1 auto; font-size: 16px; }
  .ing.dim .name { color: var(--muted); }
  .src-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 16px 52px; }
  .cta-bar { flex: 0 0 auto; background: var(--surface); border-top: 1px solid var(--hairline); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); }
</style>
</head>
<body>
<div class="stage">
  <div class="device">
    <div class="frame">
      <div class="notch"></div>
      <div class="statusbar">
        <span class="clock">9:41</span>
        <span class="indicators">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2C5.5 2 2.8 3.2 .8 5.1l1.4 1.5C3.9 5 6.1 4 8.5 4s4.6 1 6.3 2.6l1.4-1.5C14.2 3.2 11.5 2 8.5 2z"/><path d="M8.5 6.2c-1.7 0-3.3.7-4.5 1.8l1.5 1.5c.8-.8 1.9-1.2 3-1.2s2.2.4 3 1.2l1.5-1.5C11.8 6.9 10.2 6.2 8.5 6.2z"/><circle cx="8.5" cy="10.6" r="1.4"/></svg>
          <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".5"/></svg>
        </span>
      </div>

      <div class="sb-spacer"></div>
      <div class="navbar">
        <span class="nav-left"><button class="nav-btn"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>사진</button></span>
        <span class="nav-title">재료 확인</span>
        <span class="nav-right"><button class="nav-btn">추가</button></span>
      </div>

      <div class="screen-body">
        <div class="grp">
          <div class="section-label">바로 확인됨</div>
          <div class="group">
            <div class="ing"><span class="cbox high"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">양파</span></div>
            <div class="ing"><span class="cbox high"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">계란</span></div>
            <div class="ing"><span class="cbox high"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">대파</span></div>
            <div class="ing"><span class="cbox high"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">두부</span></div>
          </div>
        </div>

        <div class="grp">
          <div class="section-label">확인이 필요해요</div>
          <div class="group">
            <div class="ing"><span class="cbox high"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">애호박</span><span class="badge badge-buy">확인</span></div>
            <div class="ing"><span class="cbox high"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">당근</span><span class="badge badge-buy">확인</span></div>
          </div>
        </div>

        <div class="grp">
          <div class="section-label">이건 맞나요?</div>
          <div class="group">
            <div class="ing dim"><span class="circle-empty"></span><span class="name">표고버섯?</span><button class="btn-text" style="font-size:15px">맞아요</button></div>
          </div>
        </div>

        <div class="grp">
          <div class="section-label">무엇인지 알려주세요</div>
          <div class="group">
            <div class="ing dim" style="align-items:flex-start">
              <span class="circle-empty" style="margin-top:1px"></span>
              <div class="grow">
                <div class="name" style="color:var(--text)">소스류</div>
                <div class="t-footnote muted" style="margin-top:2px">어떤 소스인지 골라야 매칭돼요.</div>
              </div>
            </div>
            <div class="src-chips">
              <span class="chip">간장</span>
              <span class="chip">굴소스</span>
              <span class="chip">고추장</span>
              <span class="chip dashed">직접 입력</span>
            </div>
          </div>
        </div>
      </div>

      <div class="cta-bar">
        <button class="btn-primary">제안 받기</button>
        <div class="center t-footnote muted" style="margin-top:10px">소스·반찬통을 알려주면 더 정확해요.</div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</div>
</body>
</html>
