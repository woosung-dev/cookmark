<!doctype html>
<!-- 냉파 프로토타입 ④ 제안 — 낡음 배너 + "오늘 할 3개" 제안 카드(라벨·출처·부족). applied-app.jpeg 화면4 재현. -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>냉파 · ④ 제안</title>
<link rel="stylesheet" href="tokens.css">
<style>
  .nav-lg { display: flex; align-items: center; justify-content: space-between; padding: 4px 16px 8px; }
  .nav-lg .h { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .stale {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--hairline);
    border-radius: var(--r-card); padding: 12px 12px 12px 14px; margin-bottom: 18px;
  }
  .stale .ico { color: var(--muted); flex: 0 0 auto; }
  .stale .ico svg { width: 20px; height: 20px; }
  .sec-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
  .scard { margin-bottom: 16px; }
  .scard .ph { position: relative; }
  .scard .ph img { width: 100%; display: block; aspect-ratio: 16 / 9; object-fit: cover; }
  .match-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(20,20,22,.6); color: #fff;
    border-radius: var(--r-pill); padding: 5px 10px; font-size: 12px; font-weight: 600;
    backdrop-filter: blur(2px);
  }
  .scard .body { padding: 16px; }
  .src { display: flex; align-items: center; gap: 5px; color: var(--muted); margin-top: 8px; }
  .src svg { width: 14px; height: 14px; }
  .card-btns { display: flex; gap: 8px; margin-top: 16px; }
  .card-btns > * { flex: 1; }
</style>
</head>
<body>
<div class="stage">
  <div class="device">
    <div class="frame">
      <div class="notch"></div>
      <div class="statusbar">
        <span class="clock">9:41</span>
        <span class="indicators">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2C5.5 2 2.8 3.2 .8 5.1l1.4 1.5C3.9 5 6.1 4 8.5 4s4.6 1 6.3 2.6l1.4-1.5C14.2 3.2 11.5 2 8.5 2z"/><path d="M8.5 6.2c-1.7 0-3.3.7-4.5 1.8l1.5 1.5c.8-.8 1.9-1.2 3-1.2s2.2.4 3 1.2l1.5-1.5C11.8 6.9 10.2 6.2 8.5 6.2z"/><circle cx="8.5" cy="10.6" r="1.4"/></svg>
          <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".5"/></svg>
        </span>
      </div>

      <div class="sb-spacer"></div>
      <div class="nav-lg">
        <span class="h">오늘 뭐 해먹지</span>
        <button class="nav-btn">재료</button>
      </div>

      <div class="screen-body" style="padding-top:8px">
        <div class="stale">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.3-5.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M20 4v4h-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="grow t-footnote">재료가 바뀌었어요. 제안이 낡을 수 있어요.</span>
          <button class="btn-pill">다시 제안</button>
        </div>

        <div class="sec-head">
          <span class="t-title" style="font-weight:700">오늘 할 3개</span>
          <span class="t-footnote muted">레시피 북 우선 · 매칭순</span>
        </div>

        <!-- 카드 1 · 두부김치 (바로 가능) -->
        <div class="card scard">
          <div class="ph">
            <img src="https://images.unsplash.com/photo-1590301157890-4810ed352733?w=720&q=72&auto=format&fit=crop" alt="두부김치">
            <span class="match-badge"><span class="numeric">1위 · 96%</span> 일치</span>
          </div>
          <div class="body">
            <div class="between">
              <span class="t-title">두부김치</span>
              <span class="badge badge-go"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M8 12.2l2.6 2.6L16 9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>바로 가능</span>
            </div>
            <div class="src t-caption"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M16 10l5-3v10l-5-3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>유튜브 · 백종원의 요리책</div>
            <div class="t-subhead muted" style="margin-top:10px">필요한 재료 모두 있어요.</div>
            <div class="card-btns">
              <button class="btn-secondary"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M8 5.5v13l11-6.5z" fill="currentColor"/></svg>영상 보기</button>
              <button class="btn-primary">이거 했어요</button>
            </div>
          </div>
        </div>

        <!-- 카드 2 · 김치볶음밥 (이것만 사면 가능) -->
        <div class="card scard">
          <div class="ph">
            <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=720&q=72&auto=format&fit=crop" alt="김치볶음밥">
            <span class="match-badge"><span class="numeric">2위 · 88%</span> 일치</span>
          </div>
          <div class="body">
            <div class="between">
              <span class="t-title">김치볶음밥</span>
              <span class="badge badge-buy"><svg viewBox="0 0 24 24"><path d="M3 4h2l2.2 11.2a1.5 1.5 0 0 0 1.5 1.2h8a1.5 1.5 0 0 0 1.5-1.2L20 8H6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9.5" cy="20" r="1.3" fill="currentColor"/><circle cx="17" cy="20" r="1.3" fill="currentColor"/></svg>이것만 사면 가능</span>
            </div>
            <div class="src t-caption"><svg viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 3v4h4M9 12h6M9 16h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>블로그 · 만개의레시피</div>
            <div class="wrap" style="margin-top:12px; align-items:center">
              <span class="t-caption muted">부족 ·</span>
              <span class="chip danger">굴소스</span>
            </div>
            <div class="card-btns">
              <button class="btn-secondary"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M8 5.5v13l11-6.5z" fill="currentColor"/></svg>영상 보기</button>
              <button class="btn-primary">이거 했어요</button>
            </div>
          </div>
        </div>

        <!-- 카드 3 · 애호박전 (애매하지만 가능) -->
        <div class="card scard">
          <div class="ph">
            <img src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=720&q=72&auto=format&fit=crop" alt="애호박전">
            <span class="match-badge"><span class="numeric">3위 · 79%</span> 일치</span>
          </div>
          <div class="body">
            <div class="between">
              <span class="t-title">애호박전</span>
              <span class="badge badge-maybe"><svg viewBox="0 0 24 24"><path d="M7 8h11l-3-3M17 16H6l3 3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>애매하지만 가능</span>
            </div>
            <div class="src t-caption"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M16 10l5-3v10l-5-3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>유튜브 · 백종원의 요리책</div>
            <div class="wrap" style="margin-top:12px; align-items:center">
              <span class="chip maybe">밀가루→부침가루</span>
            </div>
            <div class="card-btns">
              <button class="btn-secondary"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M8 5.5v13l11-6.5z" fill="currentColor"/></svg>영상 보기</button>
              <button class="btn-primary">이거 했어요</button>
            </div>
          </div>
        </div>
      </div>

      <div class="tabbar">
        <div class="tab active">
          <svg viewBox="0 0 24 24"><path d="M4 11l8-6.5L20 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10v9h12v-9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          메인
        </div>
        <div class="tab">
          <svg viewBox="0 0 24 24"><path d="M6 4h12v16l-6-4.2L6 20z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          레시피 북
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</div>
</body>
</html>
