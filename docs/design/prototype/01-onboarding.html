<!doctype html>
<!-- 냉파 프로토타입 ① 온보딩 — 브랜드 히어로 + 신뢰 문구 + 업로드 CTA. applied-app.jpeg 화면1 재현. -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>냉파 · ① 온보딩</title>
<link rel="stylesheet" href="tokens.css">
<style>
  .hero {
    position: relative;
    flex: 0 0 auto;
    height: 384px;
    overflow: hidden;
  }
  .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero .botscrim {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to bottom, rgba(29,29,31,0) 40%, rgba(29,29,31,.62) 100%);
  }
  .hero .brand {
    position: absolute; left: 24px; bottom: 26px; z-index: 2; color: #fff;
  }
  .hero .brand .wordmark { font-size: 34px; font-weight: 700; letter-spacing: -0.6px; }
  .hero .brand .lede { margin-top: 8px; font-size: 18px; font-weight: 500; line-height: 1.42; letter-spacing: -0.2px; }
  .onb { padding: 20px var(--screen-pad) 0; }
  .notice-row { display: flex; gap: 12px; align-items: flex-start; padding: 16px; }
  .notice-row .ico { color: var(--muted); flex: 0 0 auto; margin-top: 1px; }
  .notice-row .ico svg { width: 20px; height: 20px; }
  .trust-row { display: flex; gap: 10px; align-items: center; padding: 14px 16px; }
  .trust-row .ico { color: var(--action); flex: 0 0 auto; }
  .trust-row .ico svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="stage">
  <div class="device">
    <div class="frame">
      <div class="notch"></div>
      <div class="statusbar">
        <span class="clock">9:41</span>
        <span class="indicators">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2C5.5 2 2.8 3.2 .8 5.1l1.4 1.5C3.9 5 6.1 4 8.5 4s4.6 1 6.3 2.6l1.4-1.5C14.2 3.2 11.5 2 8.5 2z"/><path d="M8.5 6.2c-1.7 0-3.3.7-4.5 1.8l1.5 1.5c.8-.8 1.9-1.2 3-1.2s2.2.4 3 1.2l1.5-1.5C11.8 6.9 10.2 6.2 8.5 6.2z"/><circle cx="8.5" cy="10.6" r="1.4"/></svg>
          <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".5"/></svg>
        </span>
      </div>

      <div class="hero">
        <div class="hero-topscrim"></div>
        <img src="https://images.unsplash.com/photo-1556909212-d5b604d0c90d?w=820&q=72&auto=format&fit=crop" alt="빨간 냄비가 놓인 밝은 주방">
        <div class="botscrim"></div>
        <div class="brand">
          <div class="wordmark">냉파</div>
          <div class="lede">냉장고 사진 한 장으로,<br>오늘 뭐 해먹을지 끝내요.</div>
        </div>
      </div>

      <div class="screen-body" style="padding-top:0">
        <div class="onb">
          <div class="card" style="border:1px solid var(--hairline)">
            <div class="notice-row">
              <span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="7.6" r="1.1" fill="currentColor"/></svg></span>
              <div class="grow">
                <div class="t-subhead" style="font-weight:600">카톡 내부 브라우저예요.</div>
                <div class="t-footnote muted" style="margin-top:3px">크롬·사파리로 열면 더 안정적이에요.</div>
              </div>
            </div>
            <div class="trust-row" style="border-top:1px solid var(--hairline)">
              <span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M8 12.2l2.6 2.6L16 9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <div class="t-subhead">출처 있는, 내가 저장한 레시피만 추천해요.</div>
            </div>
          </div>

          <button class="btn-primary" style="margin-top:20px">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 8h3l1.5-2h9L18 8h3v11H3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="13" r="3.4" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
            냉장고 사진 올리기
          </button>
          <div class="center" style="margin-top:14px">
            <button class="btn-text">레시피 북 둘러보기</button>
          </div>
        </div>
      </div>

      <div class="tabbar">
        <div class="tab active">
          <svg viewBox="0 0 24 24"><path d="M4 11l8-6.5L20 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10v9h12v-9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          메인
        </div>
        <div class="tab">
          <svg viewBox="0 0 24 24"><path d="M6 4h12v16l-6-4.2L6 20z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          레시피 북
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</div>
</body>
</html>
