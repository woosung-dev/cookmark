<!doctype html>
<!-- 냉파 프로토타입 ⑤ 제안 상세 — 히어로 + 있는/부족 재료 + 영상 + "이거 했어요". applied-app.jpeg 화면5 재현. -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>냉파 · ⑤ 제안 상세</title>
<link rel="stylesheet" href="tokens.css">
<style>
  .dhero { position: relative; flex: 0 0 auto; height: 250px; overflow: hidden; }
  .dhero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .back-btn {
    position: absolute; top: 60px; left: 16px; z-index: 25;
    width: 38px; height: 38px; border: 0; border-radius: var(--r-pill);
    background: rgba(255,255,255,.92); color: var(--text);
    display: grid; place-items: center; cursor: pointer;
    box-shadow: 0 2px 8px rgba(29,29,31,.18);
  }
  .vpill {
    position: absolute; right: 14px; bottom: 14px; z-index: 5;
    background: rgba(20,20,22,.66); color: #fff; backdrop-filter: blur(2px);
    border-radius: var(--r-pill); padding: 7px 12px 7px 10px;
    font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .vpill svg { width: 15px; height: 15px; }
  .hrow { min-height: 44px; display: flex; align-items: center; gap: 12px; padding: 9px 16px; }
  .hrow + .hrow { border-top: 1px solid var(--hairline); }
  .hrow .name { flex: 1 1 auto; font-size: 16px; }
  .tag-buy {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--action-tint); color: var(--action);
    border-radius: var(--r-pill); padding: 6px 11px; font-size: 13px; font-weight: 600;
  }
  .tag-buy svg { width: 15px; height: 15px; }
  .vid-thumb { width: 68px; height: 44px; border-radius: 8px; object-fit: cover; flex: 0 0 auto; }
  .cta-bar { flex: 0 0 auto; background: var(--surface); border-top: 1px solid var(--hairline); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); }
</style>
</head>
<body>
<div class="stage">
  <div class="device">
    <div class="frame">
      <div class="notch"></div>
      <div class="statusbar">
        <span class="clock">9:41</span>
        <span class="indicators">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2C5.5 2 2.8 3.2 .8 5.1l1.4 1.5C3.9 5 6.1 4 8.5 4s4.6 1 6.3 2.6l1.4-1.5C14.2 3.2 11.5 2 8.5 2z"/><path d="M8.5 6.2c-1.7 0-3.3.7-4.5 1.8l1.5 1.5c.8-.8 1.9-1.2 3-1.2s2.2.4 3 1.2l1.5-1.5C11.8 6.9 10.2 6.2 8.5 6.2z"/><circle cx="8.5" cy="10.6" r="1.4"/></svg>
          <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" fill="none" stroke="currentColor" stroke-opacity=".4"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" fill-opacity=".5"/></svg>
        </span>
      </div>

      <div class="dhero">
        <div class="hero-topscrim"></div>
        <img src="https://images.unsplash.com/photo-1590301157890-4810ed352733?w=820&q=74&auto=format&fit=crop" alt="두부김치">
        <button class="back-btn"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div class="vpill"><svg viewBox="0 0 24 24"><path d="M8 5.5v13l11-6.5z" fill="currentColor"/></svg>영상에서 이어보기 · <span class="numeric">2:14</span></div>
      </div>

      <div class="screen-body">
        <div class="between" style="margin-top:4px">
          <span class="t-large-title">두부김치</span>
          <span class="badge badge-go"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M8 12.2l2.6 2.6L16 9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>바로 가능</span>
        </div>
        <div class="src t-caption" style="display:flex;align-items:center;gap:5px;color:var(--muted);margin-top:8px">
          <svg width="14" height="14" viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M16 10l5-3v10l-5-3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          백종원의 요리책 · <span class="numeric">96%</span> 일치
        </div>

        <div style="margin-top:16px">
          <div class="section-label">있는 재료 · <span class="numeric">6</span></div>
          <div class="group">
            <div class="hrow"><span class="cbox have"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">두부</span></div>
            <div class="hrow"><span class="cbox have"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">김치</span></div>
            <div class="hrow"><span class="cbox have"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">대파</span></div>
            <div class="hrow"><span class="cbox have"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="name">양파 · 참기름 · 간장</span></div>
          </div>
        </div>

        <div style="margin-top:16px">
          <div class="section-label">부족 재료 · <span class="numeric">1</span></div>
          <div class="group">
            <div class="hrow"><span class="circle-empty"></span><span class="name">돼지고기 (앞다리)</span><span class="tag-buy"><svg viewBox="0 0 24 24"><path d="M3 4h2l2.2 11.2a1.5 1.5 0 0 0 1.5 1.2h8a1.5 1.5 0 0 0 1.5-1.2L20 8H6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9.5" cy="20" r="1.3" fill="currentColor"/><circle cx="17" cy="20" r="1.3" fill="currentColor"/></svg>담기</span></div>
          </div>
          <div class="t-footnote muted" style="margin-top:8px; padding:0 4px">쿠팡·마켓컬리에서 바로 담을 수 있어요.</div>
        </div>

        <div style="margin-top:16px">
          <div class="section-label">영상</div>
          <div class="group">
            <div class="hrow" style="gap:14px">
              <img class="vid-thumb" src="https://images.unsplash.com/photo-1590301157890-4810ed352733?w=180&h=120&fit=crop&q=60" alt="영상 썸네일">
              <div class="grow">
                <div class="t-subhead" style="font-weight:600">두부김치 황금레시피</div>
                <div class="t-footnote muted" style="margin-top:2px">백종원의 요리책 · 유튜브</div>
              </div>
              <span class="chevron"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            </div>
          </div>
        </div>
      </div>

      <div class="cta-bar">
        <button class="btn-primary">이거 했어요</button>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</div>
</body>
</html>
