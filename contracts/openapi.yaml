# 생성물 — 수기로 수정하지 말 것. 정본은 apps/api의 Pydantic 모델이다 (ADR-0009 계약 절).
# 재생성: cd apps/api && uv run python scripts/export_openapi.py
openapi: 3.1.0
info:
  title: cookmark-api
  version: 0.1.0
paths:
  /api/v1/health:
    get:
      summary: Health
      operationId: health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Api V1 Health Get
  /api/v1/auth/{provider}/login:
    get:
      tags:
      - auth
      summary: Start Login
      description: IdP 인가 화면으로 보낸다. redirect_uri는 라우트에서 도출해 설정 없이 성립시킨다.
      operationId: start_login_api_v1_auth__provider__login_get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Provider'
      responses:
        '302':
          description: IdP 인가 화면으로 리다이렉트
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/{provider}/callback:
    get:
      tags:
      - auth
      summary: Auth Callback
      description: IdP가 돌려보낸 코드를 검증된 신원으로 바꾸고 세션을 발급한다.
      operationId: auth_callback_api_v1_auth__provider__callback_get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Provider'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          description: 세션이 없거나 유효하지 않다
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - auth
      summary: Read Current Account
      description: 세션 검증 표면이자 로그인 데모 지점.
      operationId: read_current_account_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          description: 세션이 없거나 유효하지 않다
  /api/v1/auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: 제시된 증표를 파기한다. 이미 죽은 증표로 불러도 결과는 같으므로 멱등이다.
      operationId: logout_api_v1_auth_logout_post
      responses:
        '204':
          description: Successful Response
  /api/v1/auth/account:
    delete:
      tags:
      - auth
      summary: Withdraw
      description: 탈퇴 — 계정·세션 즉시 하드 삭제. 지울 대상은 세션에서 나오지 클라이언트가 대지 않는다.
      operationId: withdraw_api_v1_auth_account_delete
      responses:
        '204':
          description: Successful Response
        '401':
          description: 세션이 없거나 유효하지 않다
  /api/v1/recipes:
    get:
      tags:
      - recipes
      summary: List Recipes
      description: 소유자 항목만, 삽입순(created_at·id) — 스코프는 Repository 생성 시점에 이미 끝났다.
      operationId: list_recipes_api_v1_recipes_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RecipeResponse'
                type: array
                title: Response List Recipes Api V1 Recipes Get
        '401':
          description: 세션이 없거나 유효하지 않다
    post:
      tags:
      - recipes
      summary: Create Recipe
      description: 저장하면 제목에서 재료 추출이 1회 일어나 항목에 남는다. 추출 실패는 명시적 502 — 조용한 저장 없음.
      operationId: create_recipe_api_v1_recipes_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          description: 본문을 파싱할 수 없다(JSON 디코드 실패)
        '401':
          description: 세션이 없거나 유효하지 않다
        '502':
          description: 재료 추출에 실패했다 — 레시피는 저장되지 않았다
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/recipes/{recipe_id}:
    get:
      tags:
      - recipes
      summary: Read Recipe
      operationId: read_recipe_api_v1_recipes__recipe_id__get
      parameters:
      - name: recipe_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Recipe Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '401':
          description: 세션이 없거나 유효하지 않다
        '404':
          description: 레시피를 찾을 수 없다
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - recipes
      summary: Update Recipe
      description: url은 불변이고 재추출은 없다 — 바꿀 수 있는 건 title·ingredients뿐이다.
      operationId: update_recipe_api_v1_recipes__recipe_id__patch
      parameters:
      - name: recipe_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Recipe Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          description: 본문을 파싱할 수 없다(JSON 디코드 실패)
        '401':
          description: 세션이 없거나 유효하지 않다
        '404':
          description: 레시피를 찾을 수 없다
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - recipes
      summary: Delete Recipe
      operationId: delete_recipe_api_v1_recipes__recipe_id__delete
      parameters:
      - name: recipe_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Recipe Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: 세션이 없거나 유효하지 않다
        '404':
          description: 레시피를 찾을 수 없다
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AccountResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        iss:
          type: string
          title: Iss
        sub:
          type: string
          title: Sub
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - iss
      - sub
      - created_at
      title: AccountResponse
      description: 서버가 계정에 대해 아는 전부. 더 있는 것처럼 보이지 않게 이게 그대로 계약이다.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    Provider:
      type: string
      enum:
      - kakao
      - google
      title: Provider
    RecipeCreate:
      properties:
        url:
          type: string
          minLength: 1
          title: Url
        title:
          type: string
          minLength: 1
          title: Title
      additionalProperties: false
      type: object
      required:
      - url
      - title
      title: RecipeCreate
      description: ingredients는 받지 않는다 — 추출은 서버가 저장 시 1회 수행한다. 몰래 넣으면 422로 시끄럽게 거절.
    RecipeResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        url:
          type: string
          title: Url
        title:
          type: string
          title: Title
        ingredients:
          items:
            type: string
          type: array
          title: Ingredients
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - url
      - title
      - ingredients
      - created_at
      title: RecipeResponse
    RecipeUpdate:
      properties:
        title:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Title
        ingredients:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Ingredients
      additionalProperties: false
      type: object
      title: RecipeUpdate
      description: 'url은 불변 — 스키마에 없고 extra=forbid라 보내면 422다(조용한 무시가 아니라 계약). 재추출도
        없다.


        null과 부재를 같게 본다(둘 다 무변경) — ingredients=[]는 null이 아니라 "비우기"다.'
    SessionResponse:
      properties:
        token:
          type: string
          title: Token
        expires_at:
          type: string
          format: date-time
          title: Expires At
        account:
          $ref: '#/components/schemas/AccountResponse'
      type: object
      required:
      - token
      - expires_at
      - account
      title: SessionResponse
      description: 발급된 세션. 웹은 쿠키로 받으므로 token을 무시하고, 네이티브는 이 값을 보안 저장소에 넣는다 (§9).
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
